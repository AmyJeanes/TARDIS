name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - renovate/*
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        description: Publish to workshop

jobs:
  glua-check:
    name: GLua Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          path: TARDIS

      - name: Checkout Doors
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/Doors
          ref: main
          path: Doors

      - name: Checkout world-portals
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/world-portals
          ref: main
          path: world-portals

      - name: Checkout Sonic-Screwdriver
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/Sonic-Screwdriver
          ref: main
          path: Sonic-Screwdriver

      - name: Checkout wire
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: wiremod/wire
          ref: master
          path: wire

      - name: Checkout GMod-MCP-Server
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/GMod-MCP-Server
          ref: main
          path: GMod-MCP-Server

      - name: Checkout gmod-addon-tools
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/gmod-addon-tools
          # renovate: datasource=github-tags depName=AmyJeanes/gmod-addon-tools
          ref: v0.28.3
          path: gmod-addon-tools

      - name: Run glua_check
        working-directory: TARDIS
        shell: pwsh
        run: ./scripts/glua-check.ps1 -Sarif results.sarif

      - name: Upload SARIF
        if: always() && hashFiles('TARDIS/results.sarif') != ''
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: TARDIS/results.sarif
          checkout_path: ${{ github.workspace }}/TARDIS
          category: glua_check

  typing-check:
    name: Typing Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          path: TARDIS

      - name: Checkout Doors
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/Doors
          ref: main
          path: Doors

      - name: Checkout world-portals
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/world-portals
          ref: main
          path: world-portals

      - name: Checkout Sonic-Screwdriver
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/Sonic-Screwdriver
          ref: main
          path: Sonic-Screwdriver

      - name: Checkout wire
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: wiremod/wire
          ref: master
          path: wire

      - name: Checkout GMod-MCP-Server
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/GMod-MCP-Server
          ref: main
          path: GMod-MCP-Server

      - name: Checkout gmod-addon-tools
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/gmod-addon-tools
          # renovate: datasource=github-tags depName=AmyJeanes/gmod-addon-tools
          ref: v0.28.3
          path: gmod-addon-tools

      - name: Run typing check
        working-directory: TARDIS
        shell: pwsh
        run: ./scripts/typing-check.ps1

  publish:
    name: Publish to beta workshop
    needs: [glua-check, typing-check]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.publish == 'true'
    uses: AmyJeanes/gmod-addon-tools/.github/workflows/publish-workshop.yml@b9dce16368c6fe9ba55db3834b0a27b610dd1643 # v0.29.0
    with:
      addon: "TARDIS (Beta)"
      workshop_id: ${{ vars.BETA_WORKSHOP_ID }}
      mfa: false
      dry_run: ${{ vars.BETA_WORKSHOP_ID == '' }}
    secrets:
      STEAM_USERNAME: ${{ vars.STEAM_USERNAME }}
      STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
      HA_WEBHOOK_URL: ${{ secrets.HA_WEBHOOK_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.STEAM_WEBHOOK_URL }}
